name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write   # create the GitHub Release for the tag
  id-token: write   # required for npm provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - name: Tag matches package version
        if: github.event_name == 'push'
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          REF="${GITHUB_REF#refs/tags/}"
          if [ "$REF" != "$PKG" ]; then
            echo "✗ tag $REF does not match package.json version $PKG — bump the version before tagging"
            exit 1
          fi
          echo "✓ tag $REF matches package.json version"
      - name: Unit tests
        run: npm test
      - name: Anonymity lint
        run: npm run lint:anon
      - name: Build smoke test
        run: |
          npm run build:cli
          node dist-cli/cli/index.js build -c triage.config.example.yml
          test -f dist/triage.html
          if grep -q 'src="http' dist/triage.html; then
            echo "✗ built HTML references an external script — single-file invariant broken"
            exit 1
          fi
          echo "✓ dist/triage.html is self-contained"
      - name: Tarball smoke test
        run: npm run pack:smoke
      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        if: github.event_name == 'push'
        run: gh release create "${GITHUB_REF#refs/tags/}" --title "${GITHUB_REF#refs/tags/}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
