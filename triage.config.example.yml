# Copy to triage.config.yml (gitignored) and edit with your real values.
source: github
# Compiled mode bakes a per-source scope bag. No token is ever embedded — each
# user still pastes their own at runtime. Scope is non-secret (just repo names).
scope:
  repos:
    - acme-corp/web-app
    - acme-corp/api-gateway
    - acme-corp/billing-service
views:
  - code-security        # security findings: Dependabot + code scanning
  - insights           # add to enable the Insights (charts) tab
branding:
  title: "Acme Triage"
# Optional: path to a JS/TS module exporting scoring/correlation overrides.
# logicHooks: ./triage.hooks.ts
